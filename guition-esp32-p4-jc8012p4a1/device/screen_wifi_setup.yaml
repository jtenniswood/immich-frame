# =============================================================================
# SCREEN: WIFI SETUP
# =============================================================================
# Captive portal instructions shown when WiFi is disconnected.
# =============================================================================

lvgl:
  pages:
    - id: wifi_setup_page
      bg_color: 0x000000
      scrollable: false
      widgets:
        - obj:
            align: center
            width: 700
            height: SIZE_CONTENT
            bg_opa: 0%
            border_width: 0
            pad_all: 0
            scrollable: false
            layout:
              type: flex
              flex_flow: COLUMN
              flex_align_main: center
              flex_align_cross: center
              pad_row: 20
            widgets:
              - label:
                  text_font: icon_font_setup
                  text: $icon_wifi
                  text_color: 0xFFFFFF
              - label:
                  text: "WiFi Setup"
                  text_font: roboto_light46_font
                  text_color: 0xFFFFFF
                  width: 700
                  text_align: center
              - label:
                  id: wifi_setup_instructions
                  text: "Connect to the WiFi hotspot\nto configure your network"
                  text_font: roboto30_font
                  text_color: 0x888888
                  width: 700
                  text_align: center
